<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SZTAB — Serie Historyczne</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ece7df;
  font-family:Inter,sans-serif;
}

.wrap{width:min(1100px,90%);margin:auto}

.hero{
  padding:100px 0;
  text-align:center;
}

h1{
  font-family:"Cormorant Garamond";
  font-size:clamp(3rem,8vw,5rem);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:40px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.1);
  padding:20px;
}

.title{
  font-family:"Cormorant Garamond";
  font-size:1.5rem;
}

.text{
  color:rgba(236,231,223,.7);
  line-height:1.6;
}
</style>
</head>

<body>

<section class="hero">
  <h1>SZTAB</h1>
  <p>Historie oporu i decyzji</p>
</section>

<section class="wrap">

<div class="grid">

<div class="card">
  <div class="title">Zo</div>
  <div class="text">Historia Elżbiety Zawackiej.</div>
</div>

<div class="card">
  <div class="title">Karski</div>
  <div class="text">Świadek, który próbował ostrzec świat.</div>
</div>

<div class="card">
  <div class="title">Pilecki</div>
  <div class="text">Dobrowolny więzień Auschwitz.</div>
</div>

</div>

</section>

</body>
</html>
